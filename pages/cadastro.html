<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAGA | Cadastro</title>
    <link rel="stylesheet" href="../assets/css/cadastro.css" />
  </head>

  <body>
    <main>
      <header class="logo-saga">
        <img
          src="../assets/icons/logo-saga-blue.svg"
          alt="Logo SAGA"
          class="logo-img"
        />
      </header>
      <!--fim fo cabeçalho-->

      <section class="full-container">
        <!---Área contendo a caixa inteira de login-->

        <div class="glass-esquerda">
          <!--lado esquerdo da caixa, contendo uma breve introdução do site (puramente estético)-->
          <h2>BEM VINDO AO SAGA</h2>
          <p>
            Abaca ipsum dolor sit amet, consectetur adipiscing elit, sed do
            eiusmod tempor.
          </p>
        </div>

        <form class="cadastro-direito">
          <!-- lado direito da caixa com os dados a serem inseridos -->

          <div class="cadastrotop">
            <h1 class="cadastrotitle">Cadastre-se</h1>

            <button id="troca">
              <!-- Botão para trocar de tema entre modo claro e modo escuro -->
              <img
                src="../assets/icons/darkmode-moon-icon.svg"
                alt="Trocar Tema"
              />
            </button>
          </div>
          <!--fim da div logintop-->

          <div class="areaemail">
            <!--Área do e-mail-->
            <img
              src="../assets/icons/login-email-icon.svg"
              alt="Ícone de email"
              class="input-icon"
            />

            <input type="email" id="email" placeholder="E-mail" />
          </div>
          <!--fim da div areaemail-->

          <div class="areasenha">
            <img
              src="../assets/icons/login-padlock-icon.svg"
              alt="Ícone de senha"
              class="input-icon"
            />

            <input type="password" id="senha" placeholder="Senha" />
            <!--Área da senha, com opção de invisibilidade-->
          </div>
          <!--fim da div areasenha-->

          <div class="areanome">
            <img
              src="../assets/icons/usuariosemfundo-icon.svg"
              alt="Ícone de perfil"
              class="input-icon"
            />

            <input type="text" id="nome" placeholder="Nome Completo" />
            <!--Input do tipo texto-->
          </div>
          <!--fim da div areanome-->

          <div class="areafuncao">
            <img
              src="../assets/icons/icon-maleta.svg"
              alt="Ícone de maleta"
              class="input-icon"
            />

            <input type="text" id="funcao" placeholder="Função" />
            <!--Input do tipo texto-->
          </div>
          <!--fim da div areafuncao-->

          <button class="cadastrobtn">Cadastro</button>
        </form>
        <!--Fim da form logindireito -->
      </section>
    </main>
  </body>
</html>
