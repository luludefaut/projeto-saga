                    <img src="../assets/icons/global-relatorio-icon.svg" alt="icone de relatório" id="rel">
                    <h2>Relatório</h2>
                </a>
            </section>

            <section class="active">
                <a href="../pages/dashboard.html">
                    <img src="../assets/icons/global-dashboard-icon.svg" alt="icone de dashboard" id="dash">

                </a>
            </section>

                </a>
            </section>
            
            <section>
                <a href="../basico/chatbot-basico.html">

                </a>
            </section>
            
            <section>
                <a href="../pages/configuracoes.html">

                </a>
            </section>
        </article>

    </nav>

    <main>
        <header class="headerDashboard">
            <img src="/assets/icons/global-dashboard-icon.svg">
            <h1>Dashboard</h1>
        </header>
        <div class="separador"></div>
        <section class="dashboardContainer">
            <header class="headerContainer"><h3>Filtros</h3></header>
            <div class="separadorContainer"></div>
            <section class="filtros">
                <div class="filtro">
                    <label for="dataInicio">Data Inicial:</label>
                    <input type="date" id="dataInicio" name="dataInicio">
                </div>
                <div class="filtro">
                    <label for="dataFim">Data Final:</label>
                    <input type="date" id="dataFim" name="dataFim">
                </div>
                <div class="filtro">
                    <label for="categoria">Curso:</label>
                    <input type="text" id="categoria" name="categoria" placeholder="Digite o curso">
                </div>
                <div class="filtro">
                    <label for="relatorio">Relatório:</label>
                    <select id="relatorio" name="relatorio">
                        <option value="">Selecione</option>
                        <option value="relatorio1">Relatório 1</option>
                        <option value="relatorio2">Relatório 2</option>
                        <option value="relatorio3">Relatório 3</option>
                    </select>
                </div>
            </section>   
            <div class="separadorContainer"></div> 
            <section class="dadosDashboard">
                <div class="dado">
                    <h4>Total</h4>
                    <p>0</p>
                </div>
                <div class="dado">
                    <h4>Pendentes</h4>
                    <p>0</p>
                </div>
                <div class="dado">
                    <h4>Em Andamento</h4>
                    <p>0</p>
                </div>
                <div class="dado" id="concluido">
                    <h4>Concluídos</h4>
                    <p>0</p>
                </div>
            </section>
            <section class="graficos">
                <div class="grafico">
                    <h4>js AOHDOQIFHWE</h4>
                    <p>Aadsahfiuswgfewr</p>
                </div>
                <div class="grafico">
                    <h4>javascript uhuulll!!</h4>
                    <p>Aasdadasda</p>
                </div>
            </section>
        </section>
    </main>
