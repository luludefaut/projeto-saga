<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Inicial | Dashboard</title>
    <link rel="shortcut icon" type="image/png" href="assets/icons/logo-saga-blue.svg">
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!--header para a organização da tela inicial globa-->
    <header class="header-global-configuration">
        <div class="logo-inicial">
          <img src="../assets/icons/logo-saga-blue.svg" alt="logo-inicial" id="logo-principal" />
        </div>
    <!--logo do site-->

    <div class="icone-perfil">
      <a href="../pages/configuracoes.html"><img src="../assets/icons/usuario-icon.svg" alt="icone-usuario"
          id="icone-usuario" /></a>
    </div>
    <!--Icone de usuário-->
  </header>

    <nav> <!-- Side Bar principal de todo site -->

        <article id="nav-container-section">
            
            <section>
                <a href="../pages/relatorio.html">
                    <img src="../assets/icons/global-relatorio-icon.svg" alt="icone de relatório" id="rel">
                    <h2>Relatório</h2>
                </a>
            </section>

            <section class="active">
                <a href="../pages/dashboard.html">
                    <img src="../assets/icons/global-dashboard-icon.svg" alt="icone de dashboard" id="dash">
                    <h2>Dashboard</h2>
                </a>
            </section>

            <section>
                <a href="../basico/historico-basico.html">
                    <img src="../assets/icons/global-historico-icon.svg" alt="icone de histórico" id="histo">
                    <h2>Histórico</h2>
                </a>
            </section>
            
            <section>
                <a href="../basico/chatbot-basico.html">
                    <img src="../assets/icons/global-chatbot-icon.svg" alt="icone de ChatBot" id="chat">
                    <h2>ChatBot</h2>
                </a>
            </section>
            
            <section>
                <a href="../pages/configuracoes.html">
                    <img src="../assets/icons/global-configuracoes-icon.svg" alt="icone de configurações" id="config">
                    <h2>Configurações</h2>
                </a>
            </section>
        </article>

    </nav>

    <main>

        <header class="header-main-global">
            <section class="header-section-global">
                <img src="../assets/icons/global-dashboard-black-icon.svg" alt="ícone de configurações">
                <h2>Dashboard</h2>
            </section>
        </header>

         
        <section class="dashboardContainer">
            <header class="headerContainer"><h3>Filtros</h3></header>
            <div class="separadorContainer"></div>
            <section class="filtros">
                <div class="filtro">
                    <label for="dataInicio">Data Inicial:</label>
                    <div class="containerInput">
                        <input type="date" id="dataInicio" name="dataInicio">
                    </div>
                </div>
                <div class="filtro">
                    <label for="dataFim">Data Final:</label>
                    <div class="containerInput">
                        <input type="date" id="dataFim" name="dataFim">
                    </div>
                </div>
                <div class="filtro">
                    <label for="categoria">Curso:</label>
                    <div class="containerInput">
                        <input type="text" id="categoria" name="categoria" placeholder="Digite o curso">
                        <img src="../assets/icons/SVGRepo_iconCarrier.svg">
                    </div>
                </div>
                <div class="filtro">
                    <label for="relatorio">Relatório:</label>
                    <div class="containerInput">
                        <select id="relatorio" name="relatorio">
                            <option value="">Selecione</option>
                            <option value="relatorio1">Relatório 1</option>
                            <option value="relatorio2">Relatório 2</option>
                            <option value="relatorio3">Relatório 3</option>
                        </select>
                        <img src="../assets/icons/arrow 1.svg">
                    </div>
                </div>
            </section>   
            <div class="separadorContainer"></div> 
            <section class="dadosDashboard">
                <div class="dado">
                    <h4>Total</h4>
                    <p>0</p>
                </div>
                <div class="dado">
                    <h4>Pendentes</h4>
                    <p>0</p>
                </div>
                <div class="dado">
                    <h4>Em Andamento</h4>
                    <p>0</p>
                </div>
                <div class="dado" id="concluido">
                    <h4>Concluídos</h4>
                    <p>0</p>
                </div>
            </section>
            <section class="graficos">
            <div class="grafico">
                <h4>Relatórios Elaborados</h4>
                <div class="canvas-container">
                    <canvas id="graficoRelatorios"></canvas>
                </div>
            </div>
            <div class="grafico">
                <h4>Cursos com Mais Relatórios</h4>
                <div class="canvas-container">
                     <canvas id="graficoCursos"></canvas>
                </div>
            </div>
            </section>
        </section>

    </main>
  <script src="../assets/javascript/dashboard.js"></script>
</body>
</html>
