<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGA | Login</title>
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel=" icon " type="image/png" href="assets/icons/logo-saga-blue.svg">
</head>

<body id="fundo">
    <main>
        <header class="logo-container">
            <img src="../assets/icons/logo-saga-blue.svg" alt="Logo SAGA" class="logo-img">
        </header>

        <div class="container">
            <div class="lado-esquerdo">
                <h2>BEM VINDO AO SAGA</h2>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor.</p>
            </div>

            <div class="lado-direito">
                <div class="header-interno">
                    <nav class="abas"> 
                        <span class="aba-item"><h1>Login</h1></span>  
                    </nav>
                    <button id="troca">
                        <img src="../assets/icons/darkmode-moon-icon.svg" alt="Trocar Tema">
                    </button>
                </div>
                <div class="formulario">
                    <img src="../assets/icons/usuario-icon.svg" alt="Ícone de usuário" class="user-icon">
                    <div class="campoInput">
                        <div class="labelInput">
                            <img src="../assets/icons/login-email-icon.svg" alt="Ícone de email" class="input-icon">
                            <label for="email"><b>Email</b></label>
                        </div>
                        <input type="email" id="email">
                    </div>
                    <div class="campoInput">
                        <div class="labelInput">
                            <img src="../assets/icons/login-padlock-icon.svg" alt="Ícone de senha" class="input-icon">
                            <label for="senha"><b>Senha</b></label>
                        </div>
                        <input type="password" id="senha">
                    </div>
                    <div class="lembreMe">
                        <input type="checkbox" id="lembreMe">
                        <label for="lembreMe">Lembre-me</label>
                    </div>
                    <button class="btnLogin"><b>Login</b></button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>   
</body>
</html>
