<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAGA | Login</title>
    <link rel="stylesheet" href="assets/css/login.css" />
  </head>

  <body>
    <main>
      <header class="logo-saga">
        <img
          src="assets/icons/logo-saga-blue.svg"
          alt="Logo SAGA"
          class="logo-img"
        />
      </header>
      <!--fim fo cabeçalho-->

      <section class="full-container">
        <!---Área contendo a caixa inteira de login-->
        <h1 class="logintitle">Login</h1>

        <button id="troca">
          <!-- Botão para trocar de tema entre modo claro e modo escuro -->
          <img src="assets/icons/darkmode-moon-icon.svg" alt="Trocar Tema" />
        </button>

        <img
          src="assets/icons/usuario-icon.svg"
          alt="ícone de perfil"
          class="perfil"
        />

        <div class="glass-esquerda">
          <!--lado esquerdo da caixa, contendo uma breve introdução do site (puramente estético)-->
          <h2>BEM VINDO AO SAGA</h2>
          <p>
            Abaca ipsum dolor sit amet, consectetur adipiscing elit, sed do
            eiusmod tempor.
          </p>
        </div>

        <div class="login-direito">
          <!-- lado direito da caixa com os dados a serem inseridos -->

          <img
            src="assets/icons/login-email-icon.svg"
            alt="Ícone de email"
            class="input-icon"
          />

          <input type="email" id="email" placeholder="E-mail" />
          <!--Área do e-mail-->
          <img
            src="assets/icons/login-padlock-icon.svg"
            alt="Ícone de senha"
            class="input-icon"
          />

          <input type="password" id="senha" placeholder="Senha" />
          <!--Área da senha, com opção de invisibilidade-->
        </div>
        <!--Fim da div-->

        <div class="lembrarsenha">
          <!--Checkbox para lembrar a senha do usuário para evitar a reinserção da mesma -->
          <input type="checkbox" id="lembreMe" />
          <label for="lembreMe">Lembre-me</label>
        </div>
        <!--fim da div-->

        <button class="loginbtn">Login</button>
      </section>
    </main>
  </body>
</html>
